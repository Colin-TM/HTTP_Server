# Server information
SERVER_NAME=ScratchServer (Version 1)
HOST=0.0.0.0
PORT=80

# MIME types
octet-stream=application/octet-stream
gif=image/gif
html=text/html
http=message/http
jpeg=image/jpeg
pdf=application/pdf
txt=text/plain
png=image/png
ppt=application/vnd.ms-powerpoint
word=application/vnd.ms-word
xml=text/xml

# Documents root
DOCS_ROOT=/src/main/resources/docs

# Locations: access log, debug tools
ACCESS_LOGS=/src/main/resources/.well-known/
WORK_ROOT=/ScratchServer/src/main/
ERRORS_ROOT=/src/main/resources/error-pages/

# Default timeout (in seconds)
TIMEOUT=5

# Redirects (code, URI1, URI2)
RED1=302: ^(.*)/coolcar.html$ $1/galaxie.html
RED2=302: ^/a2-test/(.*)/1\.[234]/(.*) /a2-test/$1/1.1/$2
RED3=301: ^(.*)/mercury/(.*)$ $1/ford/$2
/=/index.html

# Content encodings
gz=gzip
Z=compress

# Language encodings
en=en
es=es
de=de
ja=ja
ko=ko
ru=ru

# Charsets
jis=iso-2022-jp
koi8-r=koi8-r
euc-kr=euc-kr

# Digest private keys
noncePK="aaa"
opaquePK="bbb"